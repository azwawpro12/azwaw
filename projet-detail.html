<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projet - Azwaw</title>
  <link rel="stylesheet" href="style.css?v=21">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .project-detail-hero {
      padding: 4rem 0 4rem;
      background: linear-gradient(145deg, #D8E3F5 0%, #EAF0FB 35%, #F5F6FF 65%, #E6EDF8 100%);
      border-bottom: 1px solid rgba(4,120,87,0.12);
      position: relative; overflow: hidden;
    }
    .project-detail-hero::before {
      content: '';
      position: absolute; top: -40%; left: 50%; transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.04) 0%, transparent 65%);
      pointer-events: none;
    }
    .project-header { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; position: relative; z-index: 1; }
    @media (max-width: 768px) { .project-header { grid-template-columns: 1fr; } }
    .project-title-area h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text-primary); margin-bottom: 0.8rem; line-height: 1.1; }
    .project-meta { display: flex; gap: 0.6rem; flex-wrap: wrap; margin: 1rem 0; }
    .project-badge {
      background: rgba(4,120,87,0.12);
      color: var(--accent-light);
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      border: 1px solid rgba(4,120,87,0.2);
    }
    .project-date-badge {
      background: rgba(14,116,144,0.1);
      color: var(--accent-secondary);
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      font-size: 0.82rem;
      border: 1px solid rgba(14,116,144,0.18);
    }
    .project-vitrine-hero {
      width: 100%;
      max-height: 340px;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 16px 48px rgba(15,23,42,0.12);
      border: 1px solid rgba(15,23,42,0.08);
    }
    /* Sections */
    .detail-section { padding: 3rem 0; border-bottom: 1px solid var(--border); }
    .detail-section:last-child { border-bottom: none; }
    .detail-section h2 { font-size: 1.3rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.6rem; }
    .detail-section h2 i { color: var(--accent-primary); }
    .description-block {
      background: rgba(4,120,87,0.06);
      border-left: 3px solid var(--accent-primary);
      padding: 1.5rem 1.8rem;
      border-radius: 0 12px 12px 0;
      line-height: 1.8;
      font-size: 1rem;
      color: var(--text-secondary);
    }
    .description-block p { margin-bottom: 0.8rem; }
    .description-block p:last-child { margin-bottom: 0; }
    /* Schema */
    .schema-container {
      text-align: center;
      background: rgba(15,23,42,0.02);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      margin-top: 1rem;
    }
    .schema-img {
      max-width: 100%;
      max-height: 500px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.3s ease;
      box-shadow: 0 8px 32px rgba(15,23,42,0.1);
    }
    .schema-img:hover { transform: scale(1.03); }
    /* Procedures liées */
    .procedures-linked-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .proc-linked-card {
      background: #FFFFFF;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.25s ease;
      cursor: pointer;
    }
    .proc-linked-card:hover {
      transform: translateY(-5px);
      border-color: rgba(4,120,87,0.35);
      box-shadow: 0 12px 32px rgba(15,23,42,0.12), 0 0 0 1px rgba(4,120,87,0.15);
    }
    .proc-linked-vitrine {
      width: 100%;
      height: 160px;
      object-fit: contain;
      object-position: center;
      padding: 12px;
      background: rgba(15,23,42,0.02);
      box-sizing: border-box;
    }
    .proc-linked-body { padding: 1.2rem; }
    .proc-linked-body h4 { color: var(--text-primary); font-size: 1rem; margin-bottom: 0.4rem; font-weight: 600; }
    .proc-linked-body p { color: var(--text-secondary); font-size: 0.88rem; line-height: 1.5; margin-bottom: 1rem; }
    .proc-open-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: #080808;
      color: white; padding: 0.5rem 1.2rem;
      border-radius: 20px; font-size: 0.88rem; font-weight: 600;
      border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      text-decoration: none;
    }
    .proc-open-btn:hover { opacity: 0.85; transform: translateY(-2px); }
    /* Links projet */
    .project-links { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.5rem; }
    .link-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1.3rem; border-radius: 8px;
      font-weight: 600; font-size: 0.9rem;
      text-decoration: none; transition: all 0.2s ease;
    }
    .link-btn-github { background: rgba(15,23,42,0.04); color: var(--text-primary); border: 1px solid var(--border); }
    .link-btn-github:hover { background: rgba(15,23,42,0.08); transform: translateY(-2px); }
    .link-btn-demo { background: #080808; color: white; }
    .link-btn-demo:hover { transform: translateY(-2px); border-color: rgba(49,112,142,0.3); }
    /* PDF Modal */
    #pdfModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.6);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #pdfModal.is-open { display: flex; }
    .pdf-modal-box {
      background: #FFFFFF;
      border: 1px solid rgba(4,120,87,0.2);
      width: 92vw; max-width: 1300px; height: 92vh;
      border-radius: 20px; padding: 1.5rem;
      position: relative; display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(15,23,42,0.2);
      resize: both; overflow: hidden;
      min-width: 400px; min-height: 400px;
    }
    .pdf-modal-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 1rem;
    }
    .pdf-modal-header h3 { color: var(--text-primary); font-size: 1.1rem; font-weight: 600; }
    .pdf-close-btn {
      background: rgba(15,23,42,0.04); border: 1px solid var(--border);
      border-radius: 8px; width: 36px; height: 36px;
      font-size: 1.2rem; color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .pdf-close-btn:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.3); }
    #pdfIframe { flex: 1; border: none; border-radius: 10px; }
    /* Loading */
    .loading-proj {
      text-align: center; padding: 8rem 0;
      color: var(--text-secondary); font-size: 1rem;
    }
    .loading-proj i { font-size: 2.5rem; margin-bottom: 1rem; display: block; animation: spin 1s linear infinite; color: #080808; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    /* Tags */
    .tags-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .tag-item {
      background: rgba(0,0,0,0.06); color: #080808;
      padding: 0.25rem 0.8rem; border-radius: 999px;
      font-size: 0.78rem; font-weight: 600;
      border: 1px solid rgba(4,120,87,0.2);
    }
    /* Scroll reveal */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: none; }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav-container">
      <div class="logo"><a href="index.html"><span class="logo-icon"><i class="fas fa-user-tie"></i></span><span class="logo-text">Azwaw</span></a></div>
      <ul class="nav-menu">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="about.html">À propos</a></li>
        <li><a href="competences.html">TCS</a></li>
        <li class="dropdown"><a href="projets.html" class="active">Projets <i class="fas fa-caret-down"></i></a>
          <ul class="submenu">
            <li><a href="projets.html">Tous</a></li>
            <li><a href="projets.html?cat=personal">Personnels</a></li>
            <li><a href="projets.html?cat=school">École</a></li>
            <li><a href="projets.html?cat=professional">Pro</a></li>
          </ul>
        </li>
        <li><a href="Procédures.html">Procédures</a></li>
        <li><a href="veilles.html">Veilles</a></li>
        <li><a href="certifications.html">Certifications</a></li>
        <li><a href="index.html#contact">Contact</a></li>
        <li><a href="cv.html">CV</a></li>
      </ul>
      <button id="themeToggle" class="theme-toggle"><i class="fas fa-sun"></i></button>
      <button class="mobile-menu-toggle" id="mobileToggle"><span></span><span></span><span></span></button>
    </nav>
  </header>

  <div id="pageContent" style="margin-top:68px;">
    <div class="loading-proj">
      <i class="fas fa-spinner"></i>
      Chargement du projet...
    </div>
  </div>


  <footer class="footer"><div class="container"><p>© <span id="currentYear"></span> Azwaw</p></div></footer>

  <script>
    // Dark mode
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.body.classList.toggle('dark', savedTheme === 'dark');
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
      themeToggle.innerHTML = savedTheme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
      themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const t = document.body.classList.contains('dark') ? 'dark' : 'light';
        localStorage.setItem('theme', t);
        themeToggle.innerHTML = t === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
      });
    }
    document.getElementById('mobileToggle')?.addEventListener('click', () => {
      document.querySelector('.nav-menu').classList.toggle('active');
      document.getElementById('mobileToggle').classList.toggle('open');
    });

    // Dropdown
    (function() {
      const dropdowns = document.querySelectorAll('.dropdown');
      const isMobile = () => window.innerWidth <= 900;
      dropdowns.forEach(dropdown => {
        let t;
        dropdown.addEventListener('mouseenter', () => { if (!isMobile()) { clearTimeout(t); dropdown.classList.add('open'); } });
        dropdown.addEventListener('mouseleave', () => { if (!isMobile()) t = setTimeout(() => dropdown.classList.remove('open'), 150); });
        dropdown.querySelector('a')?.addEventListener('click', (e) => {
          if (!isMobile()) return;
          e.preventDefault();
          const wasOpen = dropdown.classList.contains('open');
          dropdowns.forEach(d => d.classList.remove('open'));
          if (!wasOpen) dropdown.classList.add('open');
        });
      });
      document.addEventListener('click', (e) => { if (!e.target.closest('.dropdown')) dropdowns.forEach(d => d.classList.remove('open')); });
    })();

    // Get project ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get('id');

    let allProcedures = [];

    async function init() {
      if (!projectId) {
        document.getElementById('pageContent').innerHTML = `
          <div class="container" style="padding:140px 0; text-align:center;">
            <h2 style="color:var(--accent-primary);">Projet introuvable</h2>
            <a href="projets.html" class="btn" style="margin-top:2rem;">← Retour aux projets</a>
          </div>`;
        return;
      }

      try {
        const [projRes, procRes] = await Promise.all([
          fetch('data_projects.json'),
          fetch('data_procedures.json')
        ]);
        const projData = await projRes.json();
        const procData = await procRes.json();

        allProcedures = procData.procedures || [];
        const project = (projData.projects || []).find(p => p.id === projectId);

        if (!project) {
          document.getElementById('pageContent').innerHTML = `
            <div class="container" style="padding:140px 0; text-align:center;">
              <h2 style="color:var(--accent-primary);">Projet non trouvé</h2>
              <a href="projets.html" class="btn" style="margin-top:2rem;">← Retour aux projets</a>
            </div>`;
          return;
        }

        document.title = `${project.title} - Azwaw`;
        renderProject(project);
        initScrollReveal();
      } catch (err) {
        console.error(err);
        document.getElementById('pageContent').innerHTML = `<div class="container" style="padding:140px 0; text-align:center;"><p>Erreur de chargement.</p></div>`;
      }
    }

    function renderProject(p) {
      const linkedProcs = (p.related_procedures || [])
        .map(id => allProcedures.find(pr => pr.id === id))
        .filter(Boolean);

      const categoryLabel = { school: 'TP École', personal: 'Personnel', professional: 'Professionnel' }[p.category] || p.category;

      const descHtml = (p.description || '')
        .split('\n')
        .map(line => line.trim() ? `<p>${line.trim()}</p>` : '')
        .join('');

      let html = `
        <div class="project-detail-hero">
          <div class="container">
            <a href="projets.html" onclick="event.preventDefault(); history.back();" class="back-btn"><i class="fas fa-arrow-left"></i> Retour</a>
            <div class="project-header">
              <div class="project-title-area">
                <h1>${p.title}</h1>
                <div class="project-meta">
                  ${categoryLabel ? `<span class="project-badge"><i class="fas fa-tag"></i> ${categoryLabel}</span>` : ''}
                  ${p.date ? `<span class="project-date-badge"><i class="fas fa-calendar"></i> ${p.date}</span>` : ''}
                </div>
                ${p.tags && p.tags.length ? `<div class="tags-row">${p.tags.map(t => `<span class="tag-item">${t}</span>`).join('')}</div>` : ''}
                ${p.links ? `
                  <div class="project-links">
                    ${p.links.github && p.links.github !== '#' ? `<a href="${p.links.github}" target="_blank" class="link-btn link-btn-github"><i class="fab fa-github"></i> GitHub</a>` : ''}
                    ${p.links.demo && p.links.demo !== '#' ? `<a href="${p.links.demo}" target="_blank" class="link-btn link-btn-demo"><i class="fas fa-external-link-alt"></i> Démo</a>` : ''}
                  </div>` : ''}
              </div>
              ${p.vitrine ? `
                <div>
                  <img src="${p.vitrine}" alt="${p.title}" class="project-vitrine-hero">
                </div>` : ''}
            </div>
          </div>
        </div>

        <div class="container">

          <!-- Description -->
          <div class="detail-section reveal">
            <h2><i class="fas fa-align-left"></i> Description</h2>
            <div class="description-block">${descHtml}</div>
          </div>`;

      // Schéma
      if (p.schema) {
        html += `
          <div class="detail-section reveal">
            <h2><i class="fas fa-project-diagram"></i> Schéma Technique</h2>
            <div class="schema-container">
              <img src="${p.schema}" alt="Schéma ${p.title}" class="schema-img"
                   onclick="window.open('${p.schema}', '_blank')"
                   title="Cliquer pour agrandir">
              <p style="margin-top:0.8rem; color:var(--text-secondary); font-size:0.9rem;">
                <i class="fas fa-search-plus"></i> Cliquez sur le schéma pour l'agrandir
              </p>
            </div>
          </div>`;
      }

      // Procédures liées
      if (linkedProcs.length > 0) {
        html += `
          <div class="detail-section reveal">
            <h2><i class="fas fa-file-pdf"></i> Procédures liées (${linkedProcs.length})</h2>
            <p style="color:var(--text-secondary); margin-bottom:1.5rem;">
              Documents techniques associés à ce projet — cliquez pour ouvrir le PDF
            </p>
            <div class="procedures-linked-grid">
              ${linkedProcs.map(proc => `
                <div class="proc-linked-card" onclick="openPdf('${proc.file}', '${proc.title}')">
                  ${proc.vitrine ? `
                    <img src="${proc.vitrine}" alt="${proc.title}" class="proc-linked-vitrine">
                  ` : `
                    <div style="height:120px; display:flex; align-items:center; justify-content:center; background:var(--bg-secondary);">
                      <i class="fas fa-file-pdf" style="font-size:3rem; color:var(--accent-primary); opacity:0.5;"></i>
                    </div>
                  `}
                  <div class="proc-linked-body">
                    <h4>${proc.title}</h4>
                    ${proc.date ? `<p style="font-size:0.82rem; color:var(--text-secondary); margin-bottom:0.5rem;"><i class="fas fa-calendar"></i> ${proc.date}</p>` : ''}
                    <p>${proc.description.substring(0, 100)}${proc.description.length > 100 ? '...' : ''}</p>
                    <button class="proc-open-btn" onclick="event.stopPropagation(); openPdf('${proc.file}', '${proc.title}')">
                      <i class="fas fa-file-pdf"></i> Ouvrir le PDF
                    </button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>`;
      }

      html += `</div>`; // end container

      document.getElementById('pageContent').innerHTML = html;
    }

    function openPdf(file) {
      if (!file) return;
      window.open(file, '_blank', 'noopener,noreferrer');
    }

    function initScrollReveal() {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            obs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    }

    init();
  </script>
</body>
</html>
