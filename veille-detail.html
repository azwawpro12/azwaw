<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veille - Azwaw</title>
  <link rel="stylesheet" href="style.css?v=16">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .detail-hero {
      position: relative;
      padding: 3rem 0 2rem;
      overflow: hidden;
    }
    .detail-hero::before {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
    }
    .detail-hero.hero-tech::before {
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(14,116,144,0.12), transparent 70%);
    }
    .detail-hero.hero-juridique::before {
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(217,119,6,0.12), transparent 70%);
    }

    .detail-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; font-weight: 600;
      padding: 0.35rem 1rem; border-radius: 20px;
      margin-bottom: 1.5rem;
    }
    .badge-tech { background: rgba(14,116,144,0.15); color: #0E7490; border: 1px solid rgba(14,116,144,0.25); }
    .badge-juridique { background: rgba(217,119,6,0.15); color: #D97706; border: 1px solid rgba(217,119,6,0.25); }

    .detail-title {
      font-size: clamp(1.5rem, 3.5vw, 2.2rem);
      font-weight: 800;
      line-height: 1.25;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      max-width: 820px;
    }

    .detail-meta {
      display: flex; align-items: center; gap: 1rem;
      flex-wrap: wrap;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 0;
    }
    .detail-meta span { display: flex; align-items: center; gap: 0.4rem; }

    .detail-card {
      max-width: 860px;
      margin: 2.5rem auto 0;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(15,23,42,0.02);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .detail-image-wrap {
      width: 100%; max-height: 360px; overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .detail-image-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block;
    }

    .detail-body { padding: 2.5rem; }

    .detail-desc p {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.85;
      margin: 0 0 1.25rem;
    }
    .detail-desc p:last-child { margin-bottom: 0; }

    .detail-divider {
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
    }

    .detail-source-label {
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .detail-link-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 0.8rem 1.8rem;
      border-radius: 12px;
      font-size: 0.9rem; font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, gap 0.2s;
      cursor: pointer;
    }
    .detail-link-btn.tech-btn {
      background: linear-gradient(135deg, #047857, #0E7490);
      color: #fff;
      box-shadow: 0 4px 20px rgba(14,116,144,0.3);
    }
    .detail-link-btn.tech-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(14,116,144,0.45);
      gap: 0.9rem;
    }
    .detail-link-btn.juridique-btn {
      background: linear-gradient(135deg, #D97706, #F59E0B);
      color: #fff;
      box-shadow: 0 4px 20px rgba(217,119,6,0.3);
    }
    .detail-link-btn.juridique-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(217,119,6,0.45);
      gap: 0.9rem;
    }

    .detail-back-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-size: 0.875rem; font-weight: 500;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      background: rgba(15,23,42,0.02);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, transform 0.2s;
      margin-bottom: 2.5rem;
    }
    .detail-back-btn:hover {
      color: var(--text-primary);
      border-color: rgba(15,23,42,0.12);
      transform: translateX(-3px);
    }

    #loadingState {
      text-align: center; padding: 5rem 0;
      color: var(--text-muted); font-size: 0.9rem;
    }
    #notFound {
      text-align: center; padding: 5rem 0;
      color: var(--text-muted);
      display: none;
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav-container">
      <div class="logo"><a href="index.html"><span class="logo-icon"><i class="fas fa-user-tie"></i></span><span class="logo-text">Azwaw</span></a></div>
      <ul class="nav-menu">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="about.html">À propos</a></li>
        <li><a href="competences.html">TCS</a></li>
        <li class="dropdown"><a href="projets.html">Projets <i class="fas fa-caret-down"></i></a>
          <ul class="submenu">
            <li><a href="projets.html">Tous</a></li>
            <li><a href="projets.html?cat=personal">Personnels</a></li>
            <li><a href="projets.html?cat=school">École</a></li>
            <li><a href="projets.html?cat=professional">Pro</a></li>
          </ul>
        </li>
        <li><a href="Procédures.html">Procédures</a></li>
        <li><a href="veilles.html" class="active">Veilles</a></li>
        <li><a href="certifications.html">Certifications</a></li>
        <li><a href="index.html#contact">Contact</a></li>
        <li><a href="cv.html">CV</a></li>
      </ul>
      <button id="themeToggle" class="theme-toggle"><i class="fas fa-sun"></i></button>
      <button class="mobile-menu-toggle" id="mobileToggle"><span></span><span></span><span></span></button>
    </nav>
  </header>

  <div class="page-banner">
    <svg class="page-banner-wave-top" viewBox="0 0 1440 50" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0,35 Q360,0 720,35 Q1080,70 1440,35 L1440,50 L0,50 Z" fill="#047857"/>
    </svg>
    <div class="page-banner-body">
      <i class="fas fa-newspaper pb-icon"></i>
      <i class="fas fa-rss pb-icon"></i>
      <i class="fas fa-magnifying-glass pb-icon"></i>
      <i class="fas fa-eye pb-icon"></i>
      <i class="fas fa-bell pb-icon"></i>
      <i class="fas fa-globe pb-icon"></i>
      <h1 class="page-banner-title">Veille</h1>
      <p class="page-banner-sub">Technologie & Juridique</p>
    </div>
    <svg class="page-banner-wave-bot" viewBox="0 0 1440 50" preserveAspectRatio="none" aria-hidden="true">
      <path d="M0,0 L1440,0 L1440,15 Q1080,50 720,15 Q360,-20 0,15 Z" fill="#047857"/>
    </svg>
  </div>

  <main style="padding: 2rem 0 5rem;" class="has-page-banner">
    <div class="container">

      <div id="loadingState"><i class="fas fa-circle-notch fa-spin" style="margin-right:0.5rem;"></i> Chargement…</div>
      <div id="notFound">
        <p style="font-size:1.2rem; margin-bottom:1rem;">Veille introuvable.</p>
        <a href="veilles.html" class="detail-back-btn"><i class="fas fa-arrow-left"></i> Retour aux veilles</a>
      </div>

      <div id="detailContent" style="display:none;">
        <a id="backBtn" href="veilles.html" class="detail-back-btn">
          <i class="fas fa-arrow-left"></i> Retour
        </a>

        <div class="detail-hero" id="detailHero">
          <span class="detail-badge" id="detailBadge"></span>
          <h1 class="detail-title" id="detailTitle"></h1>
          <div class="detail-meta">
            <span id="detailDate" style="display:none;"><i class="fas fa-calendar-alt"></i> <span id="detailDateText"></span></span>
          </div>
        </div>

        <div class="detail-card">
          <div class="detail-image-wrap" id="detailImageWrap" style="display:none;">
            <img id="detailImage" alt="" loading="eager">
          </div>
          <div class="detail-body">
            <div class="detail-desc" id="detailDesc"></div>
            <div class="detail-divider" id="detailDivider" style="display:none;"></div>
            <div id="detailLinkWrap" style="display:none;">
              <p class="detail-source-label">Source</p>
              <a id="detailLink" class="detail-link-btn" href="#" target="_blank" rel="noopener noreferrer">
                Lire la source <i class="fas fa-arrow-up-right-from-square"></i>
              </a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© <span id="currentYear"></span> Azwaw</p>
    </div>
  </footer>

  <script src="scripts.js?v=13"></script>
  <script>
    const catConfig = {
      technologique: {
        label: 'Veille Technologique',
        icon: 'fa-microchip',
        badgeCls: 'badge-tech',
        heroCls: 'hero-tech',
        linkCls: 'tech-btn'
      },
      juridique: {
        label: 'Veille Juridique',
        icon: 'fa-scale-balanced',
        badgeCls: 'badge-juridique',
        heroCls: 'hero-juridique',
        linkCls: 'juridique-btn'
      }
    };

    async function loadDetail() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { showNotFound(); return; }

      try {
        const res = await fetch('data_veilles.json');
        const data = await res.json();
        const v = data.veilles.find(x => x.id === id);
        if (!v) { showNotFound(); return; }

        const cfg = catConfig[v.type] || catConfig.technologique;

        // Page title
        document.title = v.title + ' — Azwaw';

        // Back button → correct category
        const backBtn = document.getElementById('backBtn');
        backBtn.href = `veilles.html?cat=${v.type || 'technologique'}`;

        // Hero
        document.getElementById('detailHero').classList.add(cfg.heroCls);

        // Badge
        const badge = document.getElementById('detailBadge');
        badge.className = `detail-badge ${cfg.badgeCls}`;
        badge.innerHTML = `<i class="fas ${cfg.icon}"></i> ${cfg.label}`;

        // Title
        document.getElementById('detailTitle').textContent = v.title;

        // Date
        if (v.date) {
          document.getElementById('detailDate').style.display = 'flex';
          document.getElementById('detailDateText').textContent = v.date;
        }

        // Image
        const imgSrc = v.vitrine || v.image;
        if (imgSrc) {
          document.getElementById('detailImage').src = imgSrc;
          document.getElementById('detailImage').alt = v.title;
          document.getElementById('detailImageWrap').style.display = 'block';
        }

        // Description
        const desc = v.fullDescription || v.description || '';
        document.getElementById('detailDesc').innerHTML = desc
          .split('\n')
          .filter(p => p.trim())
          .map(p => `<p>${p}</p>`)
          .join('');

        // Source link
        if (v.link) {
          document.getElementById('detailDivider').style.display = 'block';
          document.getElementById('detailLinkWrap').style.display = 'block';
          const linkEl = document.getElementById('detailLink');
          linkEl.href = v.link;
          linkEl.className = `detail-link-btn ${cfg.linkCls}`;
        }

        // Show
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('detailContent').style.display = 'block';

      } catch (e) {
        showNotFound();
      }
    }

    function showNotFound() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('notFound').style.display = 'block';
    }

    loadDetail();
  </script>
</body>
</html>
