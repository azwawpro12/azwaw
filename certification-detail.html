  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <script src="scripts.js?v=13"></script>
  <script>
    async function loadCertDetail() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      if (!id) return;
      const res = await fetch('data_certifications.json');
      const data = await res.json();
      const c = data.certifications.find(x => x.id === id);
      if (!c) { document.title = 'Certification introuvable'; return; }
      document.title = c.title + ' - Azwaw';
      document.getElementById('certTitle').textContent = c.title;
      document.getElementById('certIssuer').textContent = c.issuer + (c.date ? ' • ' + c.date : '');
      document.getElementById('certDesc').textContent = c.description || '';
      if (c.image) {
        document.getElementById('certImage').src = c.image;
        document.getElementById('certImage').style.display = 'block';
      }
      if (c.link) {
        const l = document.getElementById('certLink');
        l.href = c.link;
        l.target = '_blank';
      }
    }
    loadCertDetail();
  </script>
